<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Fan Hub</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
  text-align:center;
}

header{
  padding:20px;
  font-size:22px;
  font-weight:bold;
  background:#111;
}

.card{
  background:#161616;
  margin:10px auto;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-width:500px;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
  width:80%;
}

button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff0055;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#ff3377;
}

.rank{
  text-align:left;
}

.badge{
  font-size:12px;
  padding:3px 8px;
  border-radius:6px;
  background:#333;
  margin-left:5px;
}
</style>
</head>

<body>

<header>🔥 TikTok Fan Hub PRO 🔥</header>

<div class="card">
  <h3>Entrar</h3>
  <input id="username" placeholder="Tu nombre..." />
  <button onclick="login()">Entrar</button>
</div>

<div class="card">
  <h3>🎯 Misiones</h3>
  <button onclick="addPoints(1)">Entré a la web (+1)</button>
  <button onclick="addPoints(2)">Voté / idea (+2)</button>
  <button onclick="addPoints(3)">Comenté (+3)</button>
  <button onclick="addPoints(5)">Compartí (+5)</button>
  <button onclick="addPoints(10)">Verifiqué TikTok (+10)</button>
</div>

<div class="card">
  <h3>🔗 Referido</h3>
  <div id="ref"></div>
</div>

<div class="card">
  <h3>🏆 Ranking</h3>
  <div id="ranking"></div>
</div>

<script>

let currentUser = null;

function getUsers(){
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u){
  localStorage.setItem("users", JSON.stringify(u));
}

function getLevel(points){
  if(points > 200) return "Legend";
  if(points > 100) return "Gold";
  if(points > 50) return "Silver";
  return "Bronze";
}

function login(){
  const name = document.getElementById("username").value;
  if(!name) return alert("Escribe un nombre");

  let users = getUsers();

  if(!users[name]){
    users[name] = {points:0};
  }

  currentUser = name;
  saveUsers(users);

  document.getElementById("ref").innerHTML =
    "Tu link: <br> <b>" + window.location.href.split('?')[0] + "?ref=" + name + "</b>";

  updateRanking();
}

function addPoints(p){
  if(!currentUser) return alert("Primero entra");

  let users = getUsers();
  users[currentUser].points += p;

  saveUsers(users);
  updateRanking();
}

function updateRanking(){
  let users = getUsers();

  let sorted = Object.entries(users)
  .sort((a,b)=>b[1].points-a[1].points);

  let html = "";

  sorted.forEach((u,i)=>{
    let level = getLevel(u[1].points);

    html += `
      <div class="card rank">
        #${i+1} <b>${u[0]}</b>
        <span class="badge">${level}</span><br>
        ⭐ ${u[1].points} pts
      </div>
    `;
  });

  document.getElementById("ranking").innerHTML = html;
}

updateRanking();

</script>

</body>
</html>
