<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fan Rank System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #111;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #ff0055;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      background: #ff3377;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
    }

    .rank {
      font-size: 18px;
      margin-top: 10px;
    }

    .top {
      color: gold;
    }
  </style>
</head>

<body>

<header>🔥 Fan Rank System 🔥</header>

<div class="container">

  <div class="card">
    <h3>Crear / Entrar fan</h3>
    <input id="username" placeholder="Tu nombre..." />
    <button onclick="login()">Entrar</button>
  </div>

  <div class="card">
    <h3>Ganar puntos</h3>
    <button onclick="addPoints(1)">Entrar a la web (+1)</button>
    <button onclick="addPoints(2)">Votar idea (+2)</button>
    <button onclick="addPoints(3)">Comentario (+3)</button>
    <button onclick="addPoints(5)">Compartir (+5)</button>
  </div>

  <div class="card">
    <h3>🏆 Ranking</h3>
    <div id="ranking"></div>
  </div>

</div>

<script>
let currentUser = null;

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

function login() {
  const name = document.getElementById("username").value;
  if (!name) return alert("Escribe un nombre");

  let users = getUsers();

  if (!users[name]) {
    users[name] = { points: 0 };
  }

  currentUser = name;
  saveUsers(users);

  alert("Bienvenido " + name);
  updateRanking();
}

function addPoints(points) {
  if (!currentUser) return alert("Primero entra con tu nombre");

  let users = getUsers();
  users[currentUser].points += points;

  saveUsers(users);
  updateRanking();
}

function updateRanking() {
  let users = getUsers();

  let sorted = Object.entries(users)
    .sort((a, b) => b[1].points - a[1].points);

  let html = "";

  sorted.forEach((u, i) => {
    html += `
      <div class="card ${i === 0 ? "top" : ""}">
        #${i + 1} ${u[0]} — ${u[1].points} pts
      </div>
    `;
  });

  document.getElementById("ranking").innerHTML = html;
}

updateRanking();
</script>

</body>
</html>
